<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Result | BigyanCore Learning</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="dashboard-header">

<div class="dashboard-logo">

<img src="images/logo.png" alt="BigyanCore">

<div>

<h2>BIGYANCORE LEARNING</h2>

<p>Learn Science the Smart Way.</p>

</div>

</div>

</header>

<section class="result-container">

<div class="result-card">

<img
id="result-photo"
src="images/default-user.png"
alt="Profile"
class="result-photo">

<h1>🎉 Congratulations!</h1>

<h2 id="student-name">Student Name</h2>

<p id="student-email">student@email.com</p>

<hr>

<div class="result-grid">

<div class="result-box">

<h3>📘 Chapter</h3>

<p id="chapter-name">Structure of Atom</p>

</div>

<div class="result-box">

<h3>📝 Score</h3>

<p id="score">0 / 35</p>

</div>

<div class="result-box">

<h3>⭐ Percentage</h3>

<p id="percentage">0%</p>

</div>

<div class="result-box">

<h3>🏆 Grade</h3>

<p id="grade">--</p>

</div>

</div>

<div class="result-actions">

<a href="dashboard.html" class="primary-btn">

🏠 Dashboard

</a>

<a href="quiz.html" class="primary-btn">

🔄 Retake Test

</a>

</div>

</div>

</section>

<script type="module" src="js/result.js"></script>

</body>

</html>

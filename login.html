<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | BigyanCore Learning</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{

font-family:Poppins,sans-serif;

background:linear-gradient(135deg,#1d5fd0,#020504);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

}

.login-card{

width:420px;

background:white;

padding:45px;

border-radius:18px;

box-shadow:0 20px 50px rgba(0,0,0,.18);

text-align:center;

}

.login-card img{

width:90px;

margin-bottom:20px;

}

.login-card h1{

color:#1d5fd0;

margin-bottom:5px;

}

.login-card p{

color:#666;

margin-bottom:35px;

}

.form-group{

text-align:left;

margin-bottom:20px;

}

.form-group label{

font-weight:600;

display:block;

margin-bottom:8px;

}

.form-group input{

width:100%;

padding:14px;

border:2px solid #d8e6ff;

border-radius:10px;

font-size:15px;

outline:none;

}

.form-group input:focus{

border-color:#1d5fd0;

}

.login-btn{

width:100%;

padding:15px;

background:#1d5fd0;

border:none;

color:white;

font-size:18px;

font-weight:600;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

.login-btn:hover{

background:#174caf;

transform:translateY(-2px);

}

.bottom-links{

margin-top:25px;

}

.bottom-links a{

color:#1d5fd0;

text-decoration:none;

font-weight:600;

}

.bottom-links a:hover{

text-decoration:underline;

}

</style>

</head>

<body>

<div class="login-card">

<img src="logo.png">

<h1>Welcome Back</h1>

<p>Learn Science the Smart Way.</p>

<div class="form-group">

<label>Email</label>

<input type="email" placeholder="Enter your email">

</div>

<div class="form-group">

<label>Password</label>

<input type="password" placeholder="Enter password">

</div>

<button class="login-btn">

Login

</button>

<button id="google-login" class="google-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
    Continue with Google
</button>

<div class="bottom-links">

<a href="#">Forgot Password?</a>

<br><br>

Don't have an account?

<a href="signup.html">Create Account</a>

</div>

</div>
<script type="module" src="firebase/auth.js"></script>

</body>
</html>
